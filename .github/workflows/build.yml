name: Build

on:
  push:
    branches:
      - develop
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -S . -B build

      - name: Build
        run: cmake --build build --config Debug

      - name: Token Validatin
        run:
            if [ -z "${{ secrets.REPO_ENGINE_PAT }}" ]; then
              echo "token missing"
              exit 1
            fi
            
      - name: Dispatch to engine
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.REPO_ENGINE_PAT }}
          repository: TheBossBaby/project-v-engine
          event-type: core-updated
          client-payload: >-
            {
              "target_branch": "${{ github.ref_name }}",
              "source_branch": "${{ github.ref_name }}",
              "source_sha": "${{ github.sha }}"
            }
